<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculater</title>
    <script src="script.js " defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="entry-div">
            <input type="text">
        </div>

        <div class="buttons-div ">
            <div class="functional" all-buttons>
                <button id="clear">C</button>
                <button id="backspace1">&#8592;</button>
                <button id="backspace">&#8594;</button>
                <button id="divide">&#xf7;</button>
            
            </div>
            <div class="seven-exe all-buttons">
                <button id="7">7</button>
                <button id="8">8</button>
                <button id="9">9</button>
                <button id="multiply">&#10005;</button>
            </div>
            <div class="four-minus all-buttons">
                <button id="4">4</button>
                <button id="5">5</button>
                <button id="6">6</button>
                <button id="minus">&#8722;</button>
            </div>
            <div class="one-plus all-buttons">
                <button id="1">1</button>
                <button id="2">2</button>
                <button id="3">3</button>
                <button id="plus">&#x2b;</button>
            </div>
            <div class="zero-equals all-buttons">
                <button id="0">0</button>
                <button id="dot"> &#xb7;</button>
                <button id="plus-min">&#xb1;</button>
                <button id="equals">&#61;</button>
            </div>

        </div>
    </div>
    
</body>
</html>
